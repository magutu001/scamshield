<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Access — ScamShield</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10; --surface: #111318; --surface-2: #181c24;
      --border: rgba(255,255,255,0.07); --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12); --accent-glow: rgba(0,229,160,0.3);
      --danger: #ff4757; --text-1: #f0f2f5; --text-2: #8a92a0; --text-3: #505866;
    }
    body {
      background: var(--bg); color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.15; pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: #00e5a0; top: -200px; right: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: -150px; left: -100px; }

    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 48px 40px; width: 100%; max-width: 400px;
      position: relative; z-index: 1;
    }
    .login-box::before {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
      pointer-events: none;
    }
    .lock-icon { font-size: 36px; margin-bottom: 16px; }
    h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--text-3); margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-2); margin-bottom: 8px; }
    input {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-1); font-family: 'DM Sans', sans-serif;
      font-size: 14px; padding: 12px 16px; outline: none; transition: all 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

    .login-btn {
      width: 100%; background: var(--accent); color: #0a0c10;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      border: none; border-radius: 8px; padding: 14px; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .login-btn:hover { background: #00ffb3; box-shadow: 0 0 24px var(--accent-glow); }

    .error-msg {
      background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
      color: var(--danger); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-3); }
    .back-link a { color: var(--text-2); text-decoration: none; }
    .back-link a:hover { color: var(--accent); }
  </style>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-box">
    <div class="lock-icon">🔐</div>
    <h1>Admin Access</h1>
    <p class="subtitle">This area is restricted. Enter your credentials to continue.</p>

    <div class="error-msg" id="error-msg">Incorrect email or password.</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@scamdetect.ke" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" />
    </div>

    <button class="login-btn" onclick="login()">Access Admin Panel</button>

    <div class="back-link"><a href="/">← Back to ScamShield</a></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const err = document.getElementById('error-msg');
      err.style.display = 'none';

      try {
        const res = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          // Store session token and redirect
          sessionStorage.setItem('admin_token', data.token);
          window.location.href = '/admin-panel';
        } else {
          err.style.display = 'block';
        }
      } catch {
        err.textContent = 'Server error. Is the backend running?';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
